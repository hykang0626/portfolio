<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jikko 포트폴리오 관리자 센터</title>
  
  <!-- 공통 스타일시트 링크 -->
  <link rel="stylesheet" href="src/assets/css/style.css">
  
  <!-- 관리자 페이지 추가 인라인 레이아웃 스타일 -->
  <style>
    body {
      background-color: var(--color-background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 0; /* 네비게이션바 고정 패딩 제거 */
    }
    
    /* 1. 로그인 폼 전용 레이아웃 */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      padding: 40px 20px;
    }
    
    .login-card {
      width: 100%;
      max-width: 450px;
      background-color: var(--color-surface);
      border: var(--border-thick);
      border-radius: 20px;
      padding: 40px;
      box-shadow: var(--shadow-hard-card);
    }
    
    .login-title {
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-align: center;
      font-family: 'Fredoka', sans-serif;
    }
    
    .login-subtitle {
      font-size: 1rem;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-footer {
      margin-top: 25px;
      text-align: center;
    }
    
    .back-home-link {
      font-weight: 800;
      color: var(--color-secondary);
      text-decoration: none;
      font-size: 0.95rem;
    }
    
    .back-home-link:hover {
      text-decoration: underline;
    }
    
    /* 2. 대시보드 전용 레이아웃 */
    .dashboard-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      width: 100%;
    }
    
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border-thick);
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    
    .dashboard-title {
      font-size: 2.2rem;
      font-family: 'Fredoka', sans-serif;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }
    
    @media (min-width: 992px) {
      .dashboard-grid {
        grid-template-columns: 4fr 6fr; /* 프로필 편집 4 : 작업물 관리 6 비율 */
      }
    }
    
    .dashboard-card {
      background-color: var(--color-surface);
      border: var(--border-thick);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow-hard-card);
      height: fit-content;
    }
    
    .card-title {
      font-size: 1.5rem;
      margin-bottom: 25px;
      color: var(--color-text-main);
      padding-bottom: 8px;
      border-bottom: 2px dashed #121212;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 8px;
      border-bottom: 2px dashed #121212;
    }
    
    .card-header .card-title {
      border: none;
      margin: 0;
      padding: 0;
    }
    
    /* 3. 대시보드 내 프로젝트 목록 테이블 */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      border: var(--border-thick);
      border-radius: 12px;
      background-color: var(--color-background);
    }
    
    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    
    .table-header {
      background-color: var(--color-primary);
      color: var(--color-text-main);
      font-weight: 800;
      padding: 14px 16px;
      border-bottom: var(--border-thick);
      font-size: 1rem;
    }
    
    .table-row {
      border-bottom: 2px solid var(--color-text-main);
      transition: background-color 0.2s ease;
    }
    
    .table-row:last-child {
      border-bottom: none;
    }
    
    .table-row:hover {
      background-color: #FAF8F0;
    }
    
    .table-cell {
      padding: 14px 16px;
      font-size: 0.95rem;
      color: var(--color-text-main);
      vertical-align: middle;
    }
    
    .font-bold {
      font-weight: 800;
    }
    
    .action-cells {
      display: flex;
      gap: 10px;
    }
    
    .btn-sm {
      padding: 8px 16px;
      font-size: 0.9rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- 관리자 페이지 동적 콘텐츠 주입 루트 -->
  <div id="admin-root"></div>

  <!-- 모달 렌더링 루트 -->
  <div id="admin-modal-root"></div>

  <!-- 관리자 모듈 제어 스크립트 연결 -->
  <script type="module" src="src/admin.js?v=2"></script>
</body>
</html>
